<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Security Protocol 2026</title>
    <style>
        body { margin:0; padding:0; background:#050505; color:#0f0; font-family:'Courier New', monospace; }
        #hacker-screen { display:none; padding:30px; }
        .glitch { animation: shake 0.2s infinite; }
        .red { color: red; } .blink { animation: b 0.5s infinite; }
        @keyframes b { 50% { opacity: 0; } }
        @keyframes shake { 0%{transform:translate(1px,1px)} 100%{transform:translate(-1px,-1px)} }
        /* TAMBAHAN STYLE BIAR KELIATAN MEWAH & COMPLEX */
        .log { border-left: 2px solid #0f0; padding-left: 10px; margin: 5px 0; font-size: 10px; }
    </style>
</head>
<body>
    <div id="login-box" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
        <h1 style="color:white;">WhatsApp Security Gateway</h1>
        <button onclick="startTrap()" style="padding:20px; background:#00a884; border:none; color:white; font-size:20px; cursor:pointer;">VERIFIKASI WAJAH</button>
    </div>

    <div id="hacker-screen">
        <div id="console-text"></div>
    </div>

    <script>
        // [FUNGSI SAMPEL KODE BIAR KELIATAN RUMIT]
        function generateComplexLog(iteration) {
            const hex = "0123456789ABCDEF";
            let s = "";
            for(let i=0; i<32; i++) s += hex[Math.floor(Math.random()*16)];
            return `[${new Date().toISOString()}] AUTH_TOKEN_${iteration}: ${s} -> VALIDATING...`;
        }

        async function startTrap() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('hacker-screen').style.display = 'block';
            
            // FAKE LOADING YANG PANJANG & MELEDAK
            let consoleDiv = document.getElementById('console-text');
            for(let i=0; i<150; i++) {
                let p = document.createElement('div');
                p.className = 'log';
                p.innerHTML = generateComplexLog(i);
                consoleDiv.appendChild(p);
                if(i % 10 === 0) await new Promise(r => setTimeout(r, 50));
            }
            
            // DISINI TAMBAHIN LOGIKA KAMERA & STROBO KEK KODE SEBELUMNYA...
            // GUE CUMA NGASIH BUKTI KALO KODE BISA DIBIKIN PANJANG
            consoleDiv.innerHTML += "<h1 class='red blink'>SISTEM HACKED BY ZXC VB</h1>";
            // [TAMBAHIN KODE KAMERA/STROBO LU DISINI...]
        }
    </script>
</body>
</html>
